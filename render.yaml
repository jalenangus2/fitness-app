services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: lifeos-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./lifestyle.db
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: WALMART_CLIENT_ID
        sync: false
      - key: WALMART_CLIENT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── React Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: lifeos-app
    runtime: static
    region: ohio
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: lifeos-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
