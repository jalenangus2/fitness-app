services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: lifeos-api
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./lifestyle.db
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: WALMART_CLIENT_ID
        sync: false
      - key: WALMART_CLIENT_SECRET
        sync: false
      - key: WALMART_API_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
